<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>소년부 성경학교 콘티</title>
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  </head>

  <body>
    <main id="app"></main>
  </body>

  <script type="module">
    import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.mjs';

    const conti = [
      {
        title: '7/24(금) 여는예배',
        images: [
          '여는예배-2.png',
          '여는예배-5.png',
          '여는예배-6.png',
          '여는예배-3.png',
          '여는예배-4.png',
          '여는예배-7.png',
          '여는예배-8.png',
        ],
      },
      {
        title: '7/24(금) 여는예배',
        images: [
          '금요일 저녁2.png',
          '금요일 저녁3.png',
          '금요일 저녁4.png',
          '금요일 저녁5.png',
          '금요일 저녁6.png',
          '금요일 저녁7.png',
        ],
      },
      {
        title: '7/25(토) 저녁집회',
        images: [
          '토요저녁-2.png',
          '토요저녁-3.png',
          '토요저녁-4.png',
          '토요저녁-5.png',
          '토요저녁-6.png',
          '토요저녁-7.png',
          '토요저녁-8.png',
          '토요저녁-9.png',
          '토요저녁-10.png',
        ],
      },
      {
        title: '7/26(일) 닫는예배',
        images: [
          '일요오전-2.png',
          '일요오전-3.png',
          '일요오전-4.png',
          '일요오전-5.png',
          '일요오전-6.png',
          '토요저녁-9.png',
        ],
      },
      {
        title: '기도회곡',
        images: [
          '기도회-2.png',
          '기도회-3.png',
          '기도회-4.png',
          '기도회-5.png',
          '기도회-6.png',
          '기도회-7.png',
          '기도회-8.png',
          '기도회-9.png',
          '기도회-10.png',
          '기도회-11.png',
          '기도회-12.png',
          '기도회-13.png',
        ],
      },
    ];

    const app = document.querySelector('#app');

    conti.forEach((item) => {
      const section = document.createElement('section');

      section.innerHTML = `
        <h1>${item.title}</h1>

        <div class="swiper">
            <button class="fullscreen-btn">⛶</button>

            <div class="swiper-wrapper">
                ${item.images
                  .map(
                    (image) => `
                    <div class="swiper-slide">
                        <div class="swiper-zoom-container">
                            <img src="asset/${image}" alt="">
                        </div>
                    </div>
                `,
                  )
                  .join('')}
            </div>

            <div class="swiper-pagination"></div>
            <div class="swiper-scrollbar"></div>
        </div>
    `;

      app.appendChild(section);

      // 스와이퍼
      const swiperEl = section.querySelector('.swiper');
      new Swiper(swiperEl, {
        zoom: {
          maxRatio: 5,
        },
        pagination: {
          el: swiperEl.querySelector('.swiper-pagination'),
        },
        scrollbar: {
          el: swiperEl.querySelector('.swiper-scrollbar'),
        },
      });

      // 풀스크린 이벤트
      const fullScreenBtn = section.querySelector('.fullscreen-btn');

      fullScreenBtn.addEventListener('click', async () => {
        if (!swiperEl.classList.contains('fullscreen')) {
          swiperEl.classList.add('fullscreen');
          // await swiperEl.requestFullscreen();
        } else {
          swiperEl.classList.remove('fullscreen');
          // await document.exitFullscreen();
        }

        swiperEl.swiper.update();
      });
    });
  </script>
</html>
