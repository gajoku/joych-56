<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>소년부 성경학교 콘티</title>
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  </head>

  <body>
    <section>
      <h1>7/24(금) 여는예배</h1>
      <div class="swiper" data-prefix="여는예배-" data-amount="7">
        <button class="fullscreen-btn">⛶</button>
        <div class="swiper-wrapper">
          <!-- 여기에 슬라이드 생성 됨 -->
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-scrollbar"></div>
      </div>
    </section>

    <section>
      <h1>7/24(금) 저녁집회</h1>
      <div class="swiper" data-prefix="금요일 저녁" data-amount="6">
        <button class="fullscreen-btn">⛶</button>
        <div class="swiper-wrapper">
          <!-- 여기에 슬라이드 생성 됨 -->
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-scrollbar"></div>
      </div>
    </section>

    <section>
      <h1>7/25(토) 저녁집회</h1>
      <div class="swiper" data-prefix="토요저녁-" data-amount="9">
        <button class="fullscreen-btn">⛶</button>
        <div class="swiper-wrapper">
          <!-- 여기에 슬라이드 생성 됨 -->
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-scrollbar"></div>
      </div>
    </section>

    <section>
      <h1>7/26(일) 닫는예배</h1>
      <div class="swiper" data-prefix="일요오전-" data-amount="6">
        <button class="fullscreen-btn">⛶</button>
        <div class="swiper-wrapper">
          <!-- 여기에 슬라이드 생성 됨 -->
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-scrollbar"></div>
      </div>
    </section>

    <section>
        <h1>기도회곡</h1>
        <div class="swiper" data-prefix="기도회-" data-amount="12">
            <button class="fullscreen-btn">⛶</button>
            <div class="swiper-wrapper">
                <!-- 여기에 슬라이드 생성 됨 -->
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-scrollbar"></div>
        </div>
    </section>
  </body>

  <script type="module">
    import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.mjs';

    document.querySelectorAll('.swiper')?.forEach((swiperEl, idx) => {
      const amount = Number(swiperEl.dataset.amount);
      const prefix = swiperEl.dataset.prefix;

      const wrapper = swiperEl.querySelector('.swiper-wrapper');

      wrapper.innerHTML = Array.from(
        { length: amount },
        (_, i) => `
            <div class="swiper-slide">
                <div class="swiper-zoom-container">
                    <img src="asset/${prefix}${i + 2}.png" alt="">
                </div>
            </div>
        `,
      ).join('');

      const swiper = new Swiper(swiperEl, {
        zoom: {
          maxRatio: 5,
        },
        pagination: {
          el: swiperEl.querySelector('.swiper-pagination'),
        },
        scrollbar: {
          el: swiperEl.querySelector('.swiper-scrollbar'),
        },
      });

      // DOM에 인스턴스 저장
      swiperEl.swiperInstance = swiper;
    });

    document.querySelectorAll('.fullscreen-btn').forEach((btn) => {
      btn.addEventListener('click', async (e) => {
        const swiperEl = e.currentTarget.closest('.swiper');

        if (!document.fullscreenElement) {
          await swiperEl.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }

        swiperEl.swiperInstance.update();
      });
    });
  </script>
</html>
